{% extends "painel/base.html" %}
{% block title %}Nova Conta a Pagar{% endblock %}
{% block painel_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-plus-circle me-2 text-danger"></i>Nova Conta a Pagar</h3>
    <a href="{{ url_for('financeiro.pagar') }}" class="btn btn-outline-secondary rounded-pill">← Voltar</a>
</div>
<div class="card border-0 shadow-sm rounded-4" style="max-width:560px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Descrição *</label>
                <input type="text" name="descricao" class="form-control" required placeholder="Ex: Aluguel, fornecedor...">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Valor (R$) *</label>
                    <input type="number" name="valor" class="form-control" step="0.01" min="0.01" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Fornecedor</label>
                    <select name="fornecedor_id" class="form-select">
                        <option value="">Nenhum</option>
                        {% for f in fornecedores %}
                        <option value="{{ f.id }}">{{ f.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Data de Vencimento *</label>
                <input type="date" name="data_venc" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 rounded-pill">Salvar Conta</button>
        </form>
    </div>
</div>
{% endblock %}
