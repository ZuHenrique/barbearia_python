{% extends "painel/base.html" %}
{% block title %}Novo Produto{% endblock %}
{% block painel_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-plus-circle me-2 text-primary"></i>Novo Produto</h3>
    <a href="{{ url_for('produtos.listar') }}" class="btn btn-outline-secondary rounded-pill">← Voltar</a>
</div>

<div class="card border-0 shadow-sm rounded-4" style="max-width:680px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Nome do Produto *</label>
                    <input type="text" name="nome" class="form-control" required placeholder="Ex: Pomada Modeladora, Shampoo...">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Categoria</label>
                    <select name="categoria_id" class="form-select">
                        <option value="">Sem categoria</option>
                        {% for cat in categorias %}
                        <option value="{{ cat.id }}">{{ cat.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Estoque Inicial</label>
                    <input type="number" name="estoque" class="form-control" min="0" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Estoque Mínimo</label>
                    <input type="number" name="nivel_estoque" class="form-control" min="0" value="5">
                    <small class="text-muted">Alerta abaixo disto</small>
                </div>

                <div class="col-12"><hr class="my-1"><p class="mb-0 text-muted small fw-semibold text-uppercase">Valores</p></div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Custo (Compra) *</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" name="valor_compra" id="vcompra" class="form-control" step="0.01" min="0.01" required placeholder="0,00" oninput="calcMargem()">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Preço de Venda *</label>
                    <div class="input-group">
                        <span class="input-group-text">R$</span>
                        <input type="number" name="valor_venda" id="vvenda" class="form-control" step="0.01" min="0.01" required placeholder="0,00" oninput="calcMargem()">
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Margem de Lucro</label>
                    <div class="input-group">
                        <input type="text" id="margem" class="form-control bg-light fw-bold text-success" readonly value="—">
                        <span class="input-group-text">%</span>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Descrição (opcional)</label>
                    <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva o produto..."></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                    <i class="fas fa-save me-2"></i>Cadastrar Produto
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function calcMargem() {
    const compra = parseFloat(document.getElementById('vcompra').value) || 0;
    const venda  = parseFloat(document.getElementById('vvenda').value) || 0;
    const el = document.getElementById('margem');
    if (venda > 0 && compra > 0) {
        const m = ((venda - compra) / venda * 100).toFixed(1);
        el.value = m;
        el.className = 'form-control bg-light fw-bold ' + (m >= 0 ? 'text-success' : 'text-danger');
    } else {
        el.value = '—';
    }
}
</script>
{% endblock %}
