{% extends "painel/base.html" %}
{% block title %}Novo Cliente{% endblock %}
{% block painel_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-user-plus me-2 text-primary"></i>Novo Cliente</h3>
    <a href="{{ url_for('clientes.listar') }}" class="btn btn-outline-secondary rounded-pill">← Voltar</a>
</div>

<div class="card border-0 shadow-sm rounded-4" style="max-width:680px;">
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Nome Completo *</label>
                    <input type="text" name="nome" class="form-control" required placeholder="Nome do cliente">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Data de Nascimento</label>
                    <input type="date" name="data_nasc" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Telefone / WhatsApp *</label>
                    <input type="tel" name="telefone" class="form-control" required placeholder="(11) 99999-9999">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@exemplo.com">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Endereço</label>
                    <input type="text" name="endereco" class="form-control" placeholder="Rua, número, bairro">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Alertas de Retorno</label>
                    <select name="alertado" class="form-select">
                        <option value="Não">Não enviar</option>
                        <option value="WhatsApp">Via WhatsApp</option>
                        <option value="Email">Via Email</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary px-5 rounded-pill">
                    <i class="fas fa-save me-2"></i>Cadastrar Cliente
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
